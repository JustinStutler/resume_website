<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Portfolio Chat</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="chat-container landing" id="chat-container">
        <div class="greeting">
            <div class="ai-logo" id="ai-logo">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0L14.59 8.41L23 12L14.59 15.59L12 24L9.41 15.59L1 12L9.41 8.41Z"/>
                </svg>
            </div>
            <div class="greeting-text">
                <h1 class="gemini-hello">Hello I'm Justin's Portfolio AI Assistant</h1>
                <p class="gemini-powered-by">Powered by Gemini</p>
            </div>
        </div>

        <div id="chat-window">
        </div>

        <div class="suggestions-area-wrapper">
            <!-- Column titles row — click to expand/collapse -->
            <div class="column-titles" id="column-titles" role="button" tabindex="0" aria-expanded="true">
                <span class="col-title col-title-green">Info</span>
                <span class="col-title col-title-blue">Academics</span>
                <span class="col-title col-title-amber">Projects</span>
                <span class="col-title col-title-purple">Research</span>
                <span class="col-title col-title-pink">Links</span>
                <span class="col-title col-title-orange">Docs</span>
            </div>

            <!-- Collapsible section — 6 columns -->
            <div class="suggestions-container expanded" id="suggestions-container">
                <!-- Green: Info -->
                <div class="suggestion-column col-info">
                    <span class="col-label col-label-green"><span class="key-dot key-green"></span>Info</span>
                    <button class="suggestion-btn" data-type="local-markdown"
                        data-local-file="content/tell_me_about.txt"
                        data-user-display-message="Tell me about Justin">
                        About Justin
                    </button>
                    <button class="suggestion-btn" data-type="local-markdown"
                        data-local-file="content/how_this_works.txt"
                        data-user-display-message="How does this app work?">
                        How This Works
                    </button>
                    <button class="suggestion-btn" data-type="random-image">
                        Photo Gallery
                    </button>
                </div>

                <!-- Blue: Academics -->
                <div class="suggestion-column col-academics">
                    <span class="col-label col-label-blue"><span class="key-dot key-blue"></span>Academics</span>
                    <button class="suggestion-btn" data-type="local-markdown"
                        data-user-display-message="What are Justin's GRE scores?"
                        data-local-file="content/gre_scores.txt">
                        GRE Scores
                    </button>
                    <button class="suggestion-btn" data-type="ai-query-random-class"
                        id="viewRandomClassBtn"
                        data-user-display-message="Tell me about a class Justin has taken.">
                        About a Class
                    </button>
                </div>

                <!-- Amber: Projects -->
                <div class="suggestion-column col-projects">
                    <span class="col-label col-label-amber"><span class="key-dot key-amber"></span>Projects</span>
                    <button class="suggestion-btn" data-type="in-progress">
                        AI Interface
                    </button>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="housing-prices">
                        Housing Prices
                    </button>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="facial-recognition">
                        Facial Recognition
                    </button>
                </div>

                <!-- Purple: Research -->
                <div class="suggestion-column col-research">
                    <span class="col-label col-label-purple"><span class="key-dot key-purple"></span>Research</span>
                    <button class="suggestion-btn" data-type="in-progress">
                        Song Genre from Album Art
                    </button>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="robot-localization">
                        Robot Localization
                    </button>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="uninformed-informed-search">
                        Uninformed & Informed Search
                    </button>
                </div>

                <!-- Pink: Links -->
                <div class="suggestion-column col-links">
                    <span class="col-label col-label-pink"><span class="key-dot key-pink"></span>Links</span>
                    <a href="https://github.com/JustinStutler" target="_blank" rel="noopener noreferrer"
                        class="suggestion-btn github-link-btn" data-type="external-link">
                        GitHub
                    </a>
                </div>

                <!-- Orange/Coral: Docs -->
                <div class="suggestion-column col-docs">
                    <span class="col-label col-label-orange"><span class="key-dot key-orange"></span>Docs</span>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="resume">
                        Resume
                    </button>
                    <button class="suggestion-btn" data-type="pdf" data-pdf="sop">
                        Statement of Purpose
                    </button>
                </div>
            </div>
        </div>

        <div class="input-row">
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask about Justin..." autocomplete="off">
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
