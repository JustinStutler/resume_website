<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Stutler — Wiki</title>
    <link rel="stylesheet" href="css/wiki.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <!-- Single main toolbar: home + history controls, horizontal section nav, search (Wikipedia-style) -->
    <header class="wiki-topbar topbar-collapsed">
        <div class="topbar-inner">
            <div class="topbar-controls">
                <a class="tb-btn tb-home" href="#/wiki/justin-stutler" data-wiki-id="justin-stutler"
                    title="Home" aria-label="Home">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M12 3.2 3 10.5V21h6v-6h6v6h6V10.5L12 3.2z" />
                    </svg>
                </a>
                <button class="tb-btn" onclick="window.history.back()" title="Go back" aria-label="Go back">◀</button>
                <button class="tb-btn" onclick="window.history.forward()" title="Go forward" aria-label="Go forward">▶</button>
            </div>

            <nav class="section-nav" id="section-nav" aria-label="Wiki sections">
                <a class="sec sec-red"    data-wiki-id="academics">Academics</a>
                <a class="sec sec-orange" data-wiki-id="career">Career</a>
                <a class="sec sec-yellow" data-wiki-id="projects">Projects</a>
                <a class="sec sec-green"  data-wiki-id="skills">Skills</a>
                <a class="sec sec-blue"   data-wiki-id="personal">Personal</a>
                <a class="sec sec-purple" data-wiki-id="about-this-website">About</a>
            </nav>

            <div class="search-wrap">
                <input type="text" id="wiki-search" placeholder="Search the wiki…"
                    autocomplete="off" aria-label="Search the wiki">
                <div class="search-results" id="search-results" role="listbox" hidden></div>
            </div>
        </div>
    </header>

    <!-- Article -->
    <main class="wiki-main">
        <article class="wiki-article" id="wiki-article" aria-live="polite"></article>
    </main>

    <!-- Docked AI chat: input always visible at the bottom, messages panel collapses -->
    <section class="chat-dock" id="chat-dock" aria-label="Ask the AI assistant">
        <div class="chat-dock-panel" id="chat-dock-panel">
            <div class="chat-dock-header">
                <span class="chat-dock-title">
                    <span class="ai-dot"></span> Ask about Justin
                </span>
                <button class="chat-dock-close" id="chat-dock-close" title="Collapse chat" aria-label="Collapse chat">✕</button>
            </div>
            <div class="chat-window" id="chat-window"></div>
        </div>

        <div class="chat-dock-bar">
            <button class="chat-dock-toggle" id="chat-dock-toggle" title="Expand chat" aria-label="Expand chat" aria-expanded="false">▴</button>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Ask the AI anything about Justin…" autocomplete="off">
                <button id="send-btn" title="Send message" aria-label="Send message">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <script type="module" src="js/app.js"></script>
</body>

</html>
